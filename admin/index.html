<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pronounced Kyle Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700&family=IBM+Plex+Sans+Condensed:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <main class="admin-shell">

      <section class="auth-card" id="login-card">
        <form id="login-form" class="login-form">
          <div class="form-card-head">
            <div class="eyebrow">Pronounced Kyle</div>
            <h2>Sign in</h2>
          </div>
          <label>
            <span>Username</span>
            <input type="text" name="username" autocomplete="username" />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" />
          </label>
          <button type="submit">Log in</button>
          <div class="message" id="login-message"></div>
        </form>
      </section>

      <section class="dashboard hidden" id="dashboard">
        <header class="topbar">
          <div class="mode-switch-wrap">
            <div class="mode-switch">
              <button class="mode-button is-active" type="button" data-mode="sheet">New from sheet</button>
              <button class="mode-button" type="button" data-mode="library">Edit library</button>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="session-user" class="session-user"></span>
            <button type="button" class="secondary-button" id="logout-button">Log out</button>
          </div>
        </header>

        <div class="workspace">
          <aside class="list-panel">
            <div class="panel-header">
              <div>
                <h2 id="list-title">New from sheet</h2>
              </div>
              <div class="panel-actions">
                <button type="button" class="secondary-button" id="refresh-button">Refresh</button>
              </div>
            </div>
            <div class="search-wrap">
              <input id="search-input" class="search-input" type="search" placeholder="Search..." />
            </div>
            <div id="record-list" class="record-list"></div>
          </aside>

          <section class="editor-panel">
            <div class="panel-header">
              <div>
                <h2 id="editor-title">Book</h2>
              </div>
              <div class="panel-actions">
                <button type="button" class="danger-button hidden" id="delete-button">Delete</button>
                <button type="button" id="save-button">Add to library</button>
              </div>
            </div>

            <div class="preview-workspace" id="book-preview-workspace">
              <section class="cover-panel">
                <div class="subpanel-header">
                  <h3>Cover</h3>
                  <button type="button" class="secondary-button" id="find-covers-button">Find covers</button>
                </div>
                <div class="cover-stage" id="cover-stage"></div>
                <div class="cover-controls">
                  <button type="button" class="secondary-button" id="cover-prev-button">Prev</button>
                  <div class="cover-status" id="cover-status">No covers loaded</div>
                  <button type="button" class="secondary-button" id="cover-next-button">Next</button>
                </div>
                <div class="cover-strip" id="cover-strip"></div>
              </section>

              <section class="book-preview-panel">
                <div class="subpanel-header">
                  <h3>Preview</h3>
                </div>
                <div class="book-preview" id="book-preview"></div>
              </section>
            </div>

            <form id="book-form" class="book-form">
              <div class="field-grid">
                <label><span>Title</span><input type="text" name="title" /></label>
                <label><span>Author</span><input type="text" name="author" /></label>
                <label><span>Year</span><input type="text" name="year" /></label>
                <label><span>Genre</span><input type="text" name="genre" /></label>
                <label><span>Rating</span><input type="text" name="rating" /></label>
                <label><span>Pages</span><input type="number" name="pages" /></label>
                <label><span>Completed</span><input type="text" name="completed" placeholder="5-May" /></label>
              </div>
              <div class="field-grid field-grid--wide">
                <label class="full-width"><span>Cover URL</span><input type="url" name="coverUrl" /></label>
              </div>
              <label class="full-width">
                <span>tl;dr</span>
                <textarea name="description" rows="4"></textarea>
              </label>
              <input type="hidden" name="id" />
              <input type="hidden" name="source" />
              <input type="hidden" name="sourceKey" />
              <input type="hidden" name="rowIndex" />
              <input type="hidden" name="sortDate" />
            </form>

            <div class="message" id="editor-message"></div>
          </section>
        </div>
      </section>

    </main>
    <script src="/admin/admin.js"></script>
  </body>
</html>
